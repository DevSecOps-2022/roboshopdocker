name: roboshop
services:
  mongodb:
    build: ./mongodb
    image: mongodb:v1
    container_name: mongodb

  catalogue:
    build: ./catalogue
    image: catalogue:v1
    container_name: catalogue
    depends_on:
    - mongodb
  
  user:
    build: ./user
    image: user:v1
    container_name: user
    depends_on:
    - redis
    - mongodb
  
  cart:
    build: ./cart
    image: cart:v1
    container_name: cart
    depends_on:
    - catalogue
    - redis
  mysql:
    build: ./mysql
    image: mysql:v1
    container_name: mysql

  redis:
    build: ./redis
    image: redis:v1
    container_name: redis

  shipping:
    build: ./shipping
    image: shipping:v1
    container_name: shipping
  
  Rabbitmq:
    build: ./Rabbitmq
    image: rabbitmq:v1
    container_name: rabbitmq
  
  payment:
    build: ./payment
    image: payment:v1
    container_name: payment
    depends_on:
    - rabbitmq
  
  frontend:
    build: ./frontend
    image: frontend:v1
    container_name: frontend
    ports:
    - "80:80"
    depends_on:
    - catalogue

networks:
  default:
    name: roboshop
    driver: bridge
    external: true
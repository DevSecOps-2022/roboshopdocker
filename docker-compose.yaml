name: roboshop
services:
  mongodb:
    build: ./mongodb
    image: mongodb:v1
    container_name: mongodb

  catalogue:
    build: ./catalogue
    image: catalogue:v1
    container_name: catalogue
    depends_on:
    - mongodb
  
  user:
    build: ./user
    image: user:v1
    container_name: user
    depends_on:
    - redis
    - mongodb
  
  cart:
  build: ./cart
  image: cart:v1
  container_name: cart
  depends_on:
  - catalogue
  - redis
  
  redis:
    build: ./redis
    image: redis:v1
    container_name: redis
  
  frontend:
    build: ./frontend
    image: frontend:v1
    container_name: frontend
    ports:
    - "80:80"
    depends_on:
    - catalogue

networks:
  default:
    name: roboshop
    driver: bridge
    external: true
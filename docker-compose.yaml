name: roboshop
services:
  mongodb:
    build: ./mongodb
    image: mongodb:v1
    container_name: mongodb
  catalogue:
    build: ./catalogue
    image: catalogue:v1
    conatainer_name: catalogue
    depends -on:
    - mongodb
  frontend:
    build: ./frontend
    image: frontend:v1
    container_name: frontend
    ports:
    - "80:80"
    depends_on:
    - catalogue
  networks:
    default:
      name: roboshop
      driver: bridge
      extranal: false